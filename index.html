<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#FFFFFF">
  <meta name="description" content="TaskMaster PWA - Gerenciador de Tarefas Moderno e Elegante">
  <title>TaskMaster PWA</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="manifest" href="manifest.json">
  <style>
    /* PWA Manifest */
    @media (display-mode: standalone) {
      body {
        padding-top: max(env(safe-area-inset-top), 0);
        padding-left: max(env(safe-area-inset-left), 0);
        padding-right: max(env(safe-area-inset-right), 0);
        padding-bottom: max(env(safe-area-inset-bottom), 0);
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <!-- =====================================================================
         TELA 1: CONFIGURAÇÕES (Listas)
         ===================================================================== -->
    <div id="settings-screen" class="screen active">
      <div class="header">
        <h1 class="header-title">⚙️ Configurações</h1>
      </div>
      <div class="screen-content" id="settings-content"></div>
    </div>

    <!-- =====================================================================
         TELA 2: VISÃO GERAL (Foguete)
         ===================================================================== -->
    <div id="overview-screen" class="screen">
      <div class="header">
        <h1 class="header-title">🚀 Visão Geral</h1>
      </div>
      <div class="screen-content" id="overview-content"></div>
    </div>

    <!-- =====================================================================
         TELA 3: KANBAN 1 (Por Sublista)
         ===================================================================== -->
    <div id="kanban1-screen" class="screen">
      <div class="header">
        <h1 class="header-title">📊 Kanban (Sublistas)</h1>
      </div>
      <div class="screen-content" id="kanban1-content"></div>
    </div>

    <!-- =====================================================================
         TELA 4: KANBAN 2 (Por Status)
         ===================================================================== -->
    <div id="kanban2-screen" class="screen">
      <div class="header">
        <h1 class="header-title">📋 Kanban (Status)</h1>
      </div>
      <div class="screen-content" id="kanban2-content"></div>
    </div>

    <!-- =====================================================================
         TELA 5: CADERNO (Todas as Tarefas)
         ===================================================================== -->
    <div id="notebook-screen" class="screen">
      <div class="header">
        <h1 class="header-title">📔 Caderno</h1>
      </div>
      <div class="screen-content" id="notebook-content"></div>
    </div>

    <!-- =====================================================================
         NOVA TELA: CONCLUÍDAS
         ===================================================================== -->
    <div id="completed-screen" class="screen">
      <div class="header">
        <h1 class="header-title">✅ Concluídas</h1>
      </div>
      <div class="screen-content" id="completed-content"></div>
    </div>

    <!-- =====================================================================
         TELA ADICIONAL: Detalhe da Lista
         ===================================================================== -->
    <div id="list-detail-screen" class="screen">
      <div class="header">
        <button class="header-back" id="back-btn">←</button>
        <h1 class="header-title" id="list-detail-title">Lista</h1>
      </div>
      <div class="screen-content" id="list-detail-content"></div>
    </div>

    <!-- =====================================================================
         TELA ADICIONAL: Tarefas da Sublista
         ===================================================================== -->
    <div id="sublist-tasks-screen" class="screen">
      <div class="header">
        <button class="header-back" id="back-btn-sublist">←</button>
        <h1 class="header-title" id="sublist-tasks-title">Tarefas</h1>
      </div>
      <div class="screen-content" id="sublist-tasks-content"></div>
    </div>

    <!-- =====================================================================
         BOTTOM NAVIGATION (Menu Inferior)
         ===================================================================== -->
    <div class="bottom-nav">
      <button class="nav-button active" data-screen="settings" title="Configurações">
        <span>⚙️</span>
        <span class="nav-label">Config</span>
      </button>
      <button class="nav-button" data-screen="overview" title="Visão Geral">
        <span>🚀</span>
        <span class="nav-label">Geral</span>
      </button>
      <button class="nav-button" data-screen="kanban1" title="Kanban por Sublista">
        <span>📊</span>
        <span class="nav-label">Kanban 1</span>
      </button>
      <button class="nav-button" data-screen="kanban2" title="Kanban por Status">
        <span>📋</span>
        <span class="nav-label">Kanban 2</span>
      </button>
      <button class="nav-button" data-screen="notebook" title="Caderno">
        <span>📔</span>
        <span class="nav-label">Caderno</span>
      </button>
      <button class="nav-button" data-screen="completed" title="Concluídas">
        <span>✅</span>
        <span class="nav-label">Concluídas</span>
      </button>
    </div>
  </div>

  <!-- =====================================================================
       MODAIS
       ===================================================================== -->

  <!-- Modal: Criar/Editar Lista -->
  <div id="list-modal-overlay" class="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <h2 class="modal-title" id="list-modal-title">Criar Lista</h2>
        <button class="modal-close" id="list-close-btn">✕</button>
      </div>
      <div class="modal-body">
        <label for="list-input">Nome da Lista</label>
        <input 
          type="text" 
          id="list-input" 
          placeholder="Digite o nome da lista..."
          data-list-id=""
        >
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" id="list-close-btn-footer">Cancelar</button>
        <button class="btn-primary" id="list-save-btn">Salvar</button>
      </div>
    </div>
  </div>

  <!-- Modal: Criar/Editar Sublista -->
  <div id="sublist-modal-overlay" class="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <h2 class="modal-title" id="sublist-modal-title">Criar Sublista</h2>
        <button class="modal-close" id="sublist-close-btn">✕</button>
      </div>
      <div class="modal-body">
        <label for="sublist-input">Nome da Sublista</label>
        <input 
          type="text" 
          id="sublist-input" 
          placeholder="Digite o nome da sublista..."
          data-sublist-id=""
        >
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" id="sublist-close-btn-footer">Cancelar</button>
        <button class="btn-primary" id="sublist-save-btn">Salvar</button>
      </div>
    </div>
  </div>

  <!-- Modal: Criar/Editar Tarefa -->
  <div id="task-modal-overlay" class="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <h2 class="modal-title" id="task-modal-title">Criar Tarefa</h2>
        <button class="modal-close" id="task-close-btn">✕</button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="task-input-id" value="">

        <label for="task-input-title">Título da Tarefa</label>
        <input 
          type="text" 
          id="task-input-title" 
          placeholder="Digite o título da tarefa..."
        >

        <label for="task-input-priority">Prioridade</label>
        <select id="task-input-priority">
          <option value="low">Baixa</option>
          <option value="medium">Média</option>
          <option value="high">Alta</option>
        </select>

        <label for="task-input-status">Status</label>
        <select id="task-input-status">
          <option value="todo">A Fazer</option>
          <option value="in-progress">Em Andamento</option>
          <option value="done">Concluída</option>
        </select>

        <label for="task-input-date">Data de Vencimento</label>
        <input 
          type="date" 
          id="task-input-date"
        >

        <label for="task-input-flagged">
          <input 
            type="checkbox" 
            id="task-input-flagged"
            style="width: auto; margin-right: 8px; margin-bottom: 0;"
          >
          Sinalizar como importante
        </label>

        <label for="task-input-note">Nota (Detalhes)</label>
        <textarea 
          id="task-input-note" 
          placeholder="Adicione detalhes ou notas sobre a tarefa..."
        ></textarea>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" id="task-close-btn-footer">Cancelar</button>
        <button class="btn-primary" id="task-save-btn">Salvar</button>
      </div>
    </div>
  </div>

  <!-- =====================================================================
       Scripts
       ===================================================================== -->
  <script src="script.js"></script>

  <!-- PWA Service Worker -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(err => {
        console.log('Service Worker registration failed:', err);
      });
    }
  </script>
</body>
</html>
