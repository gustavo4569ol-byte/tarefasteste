<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#FFFFFF">
  <title>TaskMaster PWA</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <div id="app">
    <!-- Telas existentes ... (mantidas) -->

    <!-- Nova Tela: Concluídas -->
    <div id="completed-screen" class="screen">
      <div class="header">
        <h1 class="header-title">✅ Concluídas</h1>
      </div>
      <div class="screen-content" id="completed-content"></div>
    </div>

    <!-- Bottom Navigation atualizado -->
    <div class="bottom-nav">
      <button class="nav-button active" data-screen="settings"><span>⚙️</span><span class="nav-label">Config</span></button>
      <button class="nav-button" data-screen="overview"><span>🚀</span><span class="nav-label">Geral</span></button>
      <button class="nav-button" data-screen="kanban1"><span>📊</span><span class="nav-label">Kanban 1</span></button>
      <button class="nav-button" data-screen="kanban2"><span>📋</span><span class="nav-label">Kanban 2</span></button>
      <button class="nav-button" data-screen="notebook"><span>📔</span><span class="nav-label">Caderno</span></button>
      <button class="nav-button" data-screen="completed"><span>✅</span><span class="nav-label">Feitas</span></button>
    </div>
  </div>

  <!-- Modais (mantidos iguais) -->
  <!-- ... todo o bloco de modais permanece o mesmo ... -->

  <script src="script.js"></script>
</body>
</html>
